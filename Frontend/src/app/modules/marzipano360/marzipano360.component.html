<div style="position: relative; width: 100%; height: 600px;">
  <div #pano style="width: 100%; height: 100%;"></div>
</div>

<!-- Modal para mostrar descripción del paciente -->
<div *ngIf="pacienteSeleccionado" id="paciente-modal" style="
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  max-width: 400px;
  z-index: 1000;
">
  <button (click)="cerrarModal()" style="position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
  
  <h2>{{ pacienteSeleccionado.nombre }}</h2>
  <p><strong>Descripción:</strong></p>
  <p>{{ pacienteSeleccionado.descripcion || 'Sin descripción disponible' }}</p>
  
  <button (click)="cerrarModal()" style="
    background: #007bff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
  ">Cerrar</button>
</div>

<!-- Overlay para cerrar modal -->
<div *ngIf="pacienteSeleccionado" (click)="cerrarModal()" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 999;
"></div>
